  <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Shelf</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  
  <div id="intro-screen" class="screen active" onclick="showShelf()">
    <div class="intro-content">
      <h1 class="fade-in">Hi cutie...</h1>
      <p class="fade-in-delayed">This is for you.</p>
      <span class="click-hint">(Click anywhere)</span>
    </div>
  </div>

  <div id="shelf-screen" class="screen">
    <div class="header">
      <h2>Open when...</h2>
      <p>Scroll through the categories and open them whenever you need them.</p>
    </div>

    <div class="categories-container">
      
      <div class="category-section">
        <h3 class="category-title">Hard Days</h3>
        <div class="horizontal-shelf" id="cat-hard"></div>
      </div>

      <div class="category-section">
        <h3 class="category-title">Late Night Letters</h3>
        <div class="horizontal-shelf" id="cat-night"></div>
      </div>

      <div class="category-section">
        <h3 class="category-title">Little Comforts</h3>
        <div class="horizontal-shelf" id="cat-comfort"></div>
      </div>

      <div class="category-section">
        <h3 class="category-title">Good Days</h3>
        <div class="horizontal-shelf" id="cat-good"></div>
      </div>

      <div class="category-section">
        <h3 class="category-title">Memories</h3>
        <div class="horizontal-shelf" id="cat-memories"></div>
      </div>

      <div class="category-section">
        <h3 class="category-title">Special</h3>
        <div class="horizontal-shelf" id="cat-special"></div>
      </div>

    </div>

    <div id="mini-bear" onclick="handleBearClick()">
      <div class="bear-shape"></div>
    </div>
  </div>

  <div id="letter-modal" class="modal">
    <div class="modal-overlay" onclick="closeLetter()"></div>
    <div class="parchment-container">
      <div id="parchment" class="parchment">
        <h3 id="letter-title"></h3>
        <div id="letter-content" class="content"></div>
        <p class="signature">— Always here</p>
        <button class="close-btn" onclick="closeLetter()">Close letter</button>
      </div>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
    <script  src="./script.js"></script>

  </body>
  
</html>
